name: tunai_pro
description: TUNAI Pro - Professional DSP Editor

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 상태관리
  flutter_riverpod: ^2.5.1

  # HTTP
  dio: ^5.4.0

  # 시리얼 통신 (ICP5 UART)
  flutter_libserialport: ^0.6.0

  # 차트 (Bode plot, 주파수 응답)
  fl_chart: ^0.68.0

  # 파일 선택 (SCF 교정 파일)
  file_picker: ^8.0.0

  # 오디오 분석 (UMIK-1)
  fftea: ^1.5.0+1

  # 로컬 저장
  shared_preferences: ^2.5.1
  record: ^6.2.1
  just_audio: ^0.10.5
  google_generative_ai: ^0.4.7
  flutter_web_auth_2: ^5.0.3
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
