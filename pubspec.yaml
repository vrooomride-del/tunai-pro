name: tunai_pro
description: TUNAI Pro - Professional DSP Editor

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 상태관리
  flutter_riverpod: ^2.5.1

  # HTTP
  dio: ^5.4.0

  # 시리얼 통신 (ICP5 UART)
  flutter_libserialport: ^0.6.0

  # BLE 통신 (ICP5 BLE — macOS/Android)
  flutter_blue_plus: ^1.31.15

  # ADAU1466 USBi 감지 (Windows 전용, SetupAPI FFI — 다른 플러그인의 전이
  # 의존성으로 이미 존재하던 버전을 직접 의존성으로 승격)
  win32: ^5.13.0
  ffi: ^2.1.0

  # 차트 (Bode plot, 주파수 응답)
  fl_chart: ^0.68.0

  # 파일 선택 (SCF 교정 파일)
  file_picker: ^8.0.0

  # 오디오 분석 (UMIK-1)
  fftea: ^1.5.0+1

  # 로컬 저장
  path_provider: ^2.1.2
  shared_preferences: ^2.5.1
  record: ^6.2.1
  just_audio: ^0.10.5
  just_audio_windows: ^0.2.1  # Windows 오디오 재생 지원
  flutter_web_auth_2: ^5.0.3
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - evidence/sigmastudio/v0_9_final/TUNAI_ADAU1466_v0_9_Final.params
